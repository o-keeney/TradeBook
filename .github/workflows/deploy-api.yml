# Manual deploy of the Hono API Worker to Cloudflare.
# Requires: real D1 `database_id` in `apps/api/wrangler.toml` and repo secret `CLOUDFLARE_API_TOKEN`.
name: Deploy API

on:
  workflow_dispatch:

concurrency:
  group: deploy-tradebook-api
  cancel-in-progress: false

jobs:
  deploy:
    name: wrangler deploy (apps/api)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Check Cloudflare token
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "Missing secret CLOUDFLARE_API_TOKEN. Create an API token with Workers Scripts:Edit (and D1/R2 as needed), then add it under Settings → Secrets and variables → Actions." >&2
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Deploy Worker
        run: npm run deploy --workspace=api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Optional if Wrangler cannot infer account from the token:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
