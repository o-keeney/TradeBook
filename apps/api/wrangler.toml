# Hono API. Deploy: npm run deploy --workspace=api
#
# Before first remote deploy:
#   wrangler d1 create tradebook-db --location=weur
#   → put returned database_id below
#   wrangler r2 bucket create tradebook-media
#   wrangler kv namespace create RATE_LIMIT
#   → put KV id below and uncomment the [[kv_namespaces]] block
#
name = "tradebook-api"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"
# Optional: add production web origin(s), comma-separated
CORS_ORIGINS = "http://localhost:3000,http://127.0.0.1:3000"
# Optional: post-verify redirect target (defaults to first CORS origin). Set in production if needed.
# APP_ORIGIN = "https://your-web-app.example"
# Email (Brevo): `wrangler secret put BREVO_API_KEY` and set BREVO_SENDER_EMAIL (+ optional BREVO_SENDER_NAME) in [vars] or .dev.vars.
# Local dev: put secrets in a file named exactly `.dev.vars` next to this file (not `.devs.vars`). Restart `wrangler dev` after changes.

[[d1_databases]]
binding = "DB"
database_name = "tradebook-db"
# Local dev placeholder. For remote deploy: `npx wrangler d1 list` / `d1 info tradebook-db` → paste real id (see apps/api/README.md).
database_id = "00000000-0000-0000-0000-000000000001"
migrations_dir = "migrations"

# Create remote bucket once: wrangler r2 bucket create tradebook-media
[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "tradebook-media"

# Uncomment and set a real KV id to enable per-IP rate limits on auth + contact routes (`src/index.ts`).
# Without this binding, the API skips KV limits (fine for local dev).
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = "YOUR_KV_NAMESPACE_ID"
